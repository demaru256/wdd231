<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet" href="styles/small.css">

<script defer>

const params = new URLSearchParams(window.location.search);

window.onload = function(){

document.getElementById("fname").textContent = params.get("firstname");
document.getElementById("lname").textContent = params.get("lastname");
document.getElementById("email").textContent = params.get("email");
document.getElementById("phone").textContent = params.get("phone");
document.getElementById("org").textContent = params.get("organization");
document.getElementById("date").textContent = params.get("timestamp");

}

</script>

</head>

<body>

<header>
<h1>Thank You!</h1>
</header>

<main>

<p>Thank you for applying to the Chamber.</p>

<ul>

<li>First Name: <span id="fname"></span></li>

<li>Last Name: <span id="lname"></span></li>

<li>Email: <span id="email"></span></li>

<li>Phone: <span id="phone"></span></li>

<li>Business: <span id="org"></span></li>

<li>Date Submitted: <span id="date"></span></li>

</ul>

</main>

</body>
</html>
